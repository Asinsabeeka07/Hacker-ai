<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="bg-grid"></div>
    
    <nav class="sidebar">
        <div class="logo">SIT</div>
        <a href="index.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span class="nav-text">Dashboard</span>
        </a>
        <a href="resume.html" class="nav-item">
            <span class="nav-icon">📄</span>
            <span class="nav-text">ATS Resume</span>
        </a>
        <a href="scheduler.html" class="nav-item">
            <span class="nav-icon">🤖</span>
            <span class="nav-text">Smart AI</span>
        </a>
        <a href="analytics.html" class="nav-item active">
            <span class="nav-icon">📈</span>
            <span class="nav-text">Analytics</span>
        </a>
    </nav>

    <main class="main-content">
        <header class="header">
            <h1>Interview Analytics</h1>
            <p style="color: var(--text-secondary);">Track your progress and success rates</p>
        </header>

        <div class="dashboard-grid">
            <div class="card" style="grid-column: span 2;">
                <div class="card-header">
                    <div class="card-icon">📊</div>
                    <span>Success Probability Trend</span>
                </div>
                <canvas id="trendChart" height="100"></canvas>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-icon">🏆</div>
                    <span>Statistics</span>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div style="text-align: center; padding: 20px; background: rgba(255,0,51,0.1); border-radius: 10px;">
                        <div style="font-size: 32px; color: var(--accent-red); font-weight: bold;" id="totalInt">0</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">Total Interviews</div>
                    </div>
                    <div style="text-align: center; padding: 20px; background: rgba(255,0,51,0.1); border-radius: 10px;">
                        <div style="font-size: 32px; color: var(--accent-red); font-weight: bold;" id="avgProb">0%</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">Avg Probability</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        async function loadAnalytics() {
            const res = await fetch('/api/interviews');
            const data = await res.json();
            
            document.getElementById('totalInt').textContent = data.length;
            const avg = data.length ? data.reduce((a,b) => a + (b.probability || 0), 0) / data.length : 0;
            document.getElementById('avgProb').textContent = Math.round(avg) + '%';

            // Chart
            const ctx = document.getElementById('trendChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map((d, i) => `Int ${i+1}`),
                    datasets: [{
                        label: 'Success Probability',
                        data: data.map(d => d.probability || 0),
                        borderColor: '#ff0033',
                        backgroundColor: 'rgba(255, 0, 51, 0.1)',
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: 'white' } }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: 'white' }
                        },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: 'white' }
                        }
                    }
                }
            });
        }
        loadAnalytics();
    </script>
</body>
</html>
